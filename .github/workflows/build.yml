name: Build com runtime completo

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Maven
        working-directory: src/SistemaDeTarefasFX
        run: mvn clean package dependency:copy-dependencies

      - name: Baixar JavaFX SDK
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/17.0.10/openjfx-17.0.10_windows-x64_bin-sdk.zip
          tar -xf javafx.zip

      - name: Criar runtime com jlink
        shell: cmd
        run: |
          jlink ^
          --module-path "%JAVA_HOME%\jmods;openjfx-17.0.10_windows-x64_bin-sdk\javafx-sdk-17.0.10\lib" ^
          --add-modules java.base,javafx.controls,javafx.fxml ^
          --output runtime

      - name: Criar .exe
        shell: cmd
        run: |
          jpackage ^
          --input src\SistemaDeTarefasFX\target ^
          --name SistemaDeTarefas ^
          --main-jar SistemaDeTarefasFX-1.0-SNAPSHOT.jar ^
          --main-class sistema.de.tarefas.Launcher ^
          --runtime-image runtime ^
          --type exe ^
          --dest output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: output\*
