name: Build com JavaFX embutido (final corrigido)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Maven + dependências
        working-directory: src/SistemaDeTarefasFX
        run: mvn clean package dependency:copy-dependencies

      # ✅ AGORA COM DIR (pra confirmar estrutura)
      - name: Baixar e extrair JavaFX
        shell: cmd
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/17.0.10/openjfx-17.0.10_windows-x64_bin-sdk.zip
          tar -xf javafx.zip
          echo ===== LISTAGEM APÓS EXTRAÇÃO =====
          dir

      # ✅ DETECÇÃO AUTOMÁTICA (não depende do nome exato)
      - name: Detectar caminho do JavaFX
        shell: cmd
        run: |
          for /d %%i in (javafx-sdk-*) do (
            echo JAVAFX_PATH=%%i\lib>>%GITHUB_ENV%
          )

      - name: Criar runtime (jlink)
        shell: cmd
        run: |
          echo JAVAFX_PATH=%JAVAFX_PATH%
          jlink ^
          --module-path "%JAVA_HOME%\jmods;%JAVAFX_PATH%" ^
          --add-modules java.base,javafx.controls,javafx.fxml ^
          --output runtime

      - name: Criar .exe
        shell: cmd
        run: |
          jpackage ^
          --input src\SistemaDeTarefasFX\target ^
          --name SistemaDeTarefas ^
          --main-jar SistemaDeTarefasFX-1.0-SNAPSHOT.jar ^
          --main-class sistema.de.tarefas.Launcher ^
          --runtime-image runtime ^
          --type exe ^
          --dest output

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: output\*
