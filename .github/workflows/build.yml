name: Build and Release Multiplatform

on:
  push:
    tags:
      - 'v*' # Vai rodar sempre que você criar uma tag tipo v1.0.0

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar e Empacotar com Maven
      run: mvn clean package
      working-directory: src/SistemaDeTarefasFX

    - name: Gerar Pacote Nativo com jpackage
      run: |
        jpackage --type ${{ matrix.os == 'windows-latest' && 'exe' || 'dmg' }} \
          --input src/SistemaDeTarefasFX/target \
          --main-jar SistemaDeTarefasFX-1.0-SNAPSHOT.jar \
          --name SistemaDeTarefas \
          --vendor "Filipe" \
          --dest output
        
    - name: Fazer Upload do Artefato
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.os }}
        path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Baixar todos os artefatos
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Criar Release no GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/app-windows-latest/*
          artifacts/app-macos-latest/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
